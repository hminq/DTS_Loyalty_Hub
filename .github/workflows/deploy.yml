name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOCKERHUB_NAMESPACE: hminq
  ADMIN_API_IMAGE: hminq/dts-loyalty-admin-api
  CUSTOMER_API_IMAGE: hminq/dts-loyalty-customer-api
  CONSUMER_IMAGE: hminq/dts-loyalty-consumer
  SCHEDULER_IMAGE: hminq/dts-loyalty-scheduler

jobs:
  test:
    name: Run automated tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Admin API Unit Test
        run: dotnet test api/admin/Api-Admin.sln --configuration Release --disable-build-servers

      - name: Customer API Unit Test
        run: dotnet test api/customer/Api-Customer.sln --configuration Release --disable-build-servers

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/admin/package-lock.json

      - name: Build admin web
        working-directory: web/admin
        env:
          VITE_API_BASE_URL: ${{ secrets.ADMIN_WEB_API_BASE_URL }}
        run: |
          npm ci
          npm run build -- --base=${{ secrets.ADMIN_WEB_BASE_PATH }}

  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/admin/package-lock.json

      - name: Build admin web
        working-directory: web/admin
        env:
          VITE_API_BASE_URL: ${{ secrets.ADMIN_WEB_API_BASE_URL }}
        run: |
          npm ci
          npm run build -- --base=${{ secrets.ADMIN_WEB_BASE_PATH }}

      - name: Prepare static files
        run: |
          mkdir -p .deploy/admin
          mkdir -p .deploy/customer
          cp -R web/admin/dist/. .deploy/admin/
          cp -R web/client/. .deploy/customer/

      - name: Build and push admin API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/admin/Dockerfile
          push: true
          tags: ${{ env.ADMIN_API_IMAGE }}:${{ github.sha }}

      - name: Build and push customer API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/customer/Dockerfile
          push: true
          tags: ${{ env.CUSTOMER_API_IMAGE }}:${{ github.sha }}

      - name: Build and push consumer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Consumer/Dockerfile
          push: true
          tags: ${{ env.CONSUMER_IMAGE }}:${{ github.sha }}

      - name: Build and push scheduler
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Scheduler/Dockerfile
          push: true
          tags: ${{ env.SCHEDULER_IMAGE }}:${{ github.sha }}

      - name: Upload admin static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: ".deploy/admin/*"
          target: ${{ secrets.VPS_APP_DIR }}/web/admin
          strip_components: 2
          overwrite: true

      - name: Upload customer static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: ".deploy/customer/*"
          target: ${{ secrets.VPS_APP_DIR }}/web/customer
          strip_components: 2
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd "${{ secrets.VPS_APP_DIR }}"
            IMAGE_TAG="${{ github.sha }}" docker compose pull admin-api customer-api consumer scheduler nginx
            IMAGE_TAG="${{ github.sha }}" docker compose up -d
            docker image prune -f
