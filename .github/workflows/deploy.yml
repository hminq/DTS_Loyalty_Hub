name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOCKERHUB_NAMESPACE: hminq
  ADMIN_API_IMAGE: hminq/dts-loyalty-admin-api
  CUSTOMER_API_IMAGE: hminq/dts-loyalty-customer-api
  CONSUMER_IMAGE: hminq/dts-loyalty-consumer
  SCHEDULER_IMAGE: hminq/dts-loyalty-scheduler

jobs:
  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push admin API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/admin/Dockerfile
          push: true
          tags: ${{ env.ADMIN_API_IMAGE }}:${{ github.sha }}

      - name: Build and push customer API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/customer/Dockerfile
          push: true
          tags: ${{ env.CUSTOMER_API_IMAGE }}:${{ github.sha }}

      - name: Build and push consumer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Consumer/Dockerfile
          push: true
          tags: ${{ env.CONSUMER_IMAGE }}:${{ github.sha }}

      - name: Build and push scheduler
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Scheduler/Dockerfile
          push: true
          tags: ${{ env.SCHEDULER_IMAGE }}:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd "${{ secrets.VPS_APP_DIR }}"
            IMAGE_TAG="${{ github.sha }}" docker compose pull admin-api customer-api consumer scheduler
            IMAGE_TAG="${{ github.sha }}" docker compose up -d
            docker image prune -f
